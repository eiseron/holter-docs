stages:
  - build
  - deploy
  - sync

workflow:
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

cache:
  key:
    files:
      - package-lock.json
  paths:
    - node_modules/

build:
  stage: build
  image: node:22-alpine
  script:
    - npm ci
    - npm run build
  artifacts:
    paths:
      - .vitepress/dist/
    expire_in: 1 hour

deploy:
  stage: deploy
  image: node:22-alpine
  script:
    - npx wrangler pages deploy .vitepress/dist --project-name=holter-docs --branch=main
  environment:
    name: production
    url: https://docs.holter.dev

sync-github:
  stage: sync
  image: alpine:3
  variables:
    GIT_DEPTH: "0"
  before_script:
    - apk add --no-cache git curl jq openssl
    - |
      echo "$GITHUB_APP_PRIVATE_KEY" | base64 -d > /tmp/github-app.pem
      now=$(date +%s)
      iat=$((now - 60))
      exp=$((now + 540))
      header=$(printf '{"alg":"RS256","typ":"JWT"}' | base64 | tr -d '=' | tr '+/' '-_' | tr -d '\n')
      payload=$(printf '{"iat":%d,"exp":%d,"iss":"%s"}' "$iat" "$exp" "$GITHUB_APP_ID" | base64 | tr -d '=' | tr '+/' '-_' | tr -d '\n')
      sig=$(printf '%s.%s' "$header" "$payload" | openssl dgst -sha256 -sign /tmp/github-app.pem | base64 | tr -d '=' | tr '+/' '-_' | tr -d '\n')
      GITHUB_TOKEN=$(curl -sf \
        -X POST \
        -H "Authorization: Bearer ${header}.${payload}.${sig}" \
        -H "Accept: application/vnd.github+json" \
        "https://api.github.com/app/installations/$GITHUB_APP_INSTALLATION_ID/access_tokens" \
        | jq -r '.token')
      export GITHUB_TOKEN
      rm /tmp/github-app.pem
  script:
    - git remote add github "https://x-access-token:${GITHUB_TOKEN}@github.com/eiseron/$CI_PROJECT_NAME.git"
    - git push github HEAD:main --tags --force
