image: node:22-alpine

stages:
  - build
  - deploy

workflow:
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

cache:
  key:
    files:
      - package-lock.json
  paths:
    - node_modules/

build:
  stage: build
  script:
    - npm ci
    - npm run build
  artifacts:
    paths:
      - .vitepress/dist/
    expire_in: 1 hour

deploy:
  stage: deploy
  script:
    - npx wrangler pages deploy .vitepress/dist --project-name=holter-docs --branch=main
  environment:
    name: production
    url: https://docs.holter.dev
